<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos • News Aggregator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600;700&family=Darker+Grotesque:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Background grain texture -->
    <div class="grain-overlay"></div>
    
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo-section">
                    <h1 class="logo">Chronos</h1>
                    <p class="tagline">Global news, curated</p>
                </div>
                
                <div class="header-meta">
                    <div class="update-info">
                        <span class="update-label">Last updated</span>
                        <span class="update-time" id="lastUpdate">—</span>
                    </div>
                    <button class="refresh-btn" id="refreshBtn">
                        <svg class="refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                        </svg>
                        Refresh
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Loading State -->
    <div class="loading-state" id="loadingState">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <p class="loading-text">Gathering stories from around the world...</p>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <div class="container">
            <div class="news-grid" id="newsGrid">
                <div class="empty-state">
                    <p>Loading news...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="footer-text">
                Aggregating from <span class="highlight">BBC News</span>, 
                <span class="highlight">CNN</span>, 
                <span class="highlight">Al Jazeera</span>, 
                <span class="highlight">AP News</span>, 
                <span class="highlight">The New York Times</span>,
                <span class="highlight">Dawn</span>, and
                <span class="highlight">NPR News</span>
            </p>
            <p class="footer-note">Powered by Selenium • Built with care</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
